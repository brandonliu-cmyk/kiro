    function pickFirstLeafInNodes(nodes, parentGroup = null) {
      if (!nodes || !nodes.length) return null;
      for (const n of nodes) {
        if (n.children && n.children.length) {
          const inner = pickFirstLeafInNodes(n.children, n);
          if (inner) return inner;
        } else return { node: n, parentGroup };
      }
      return null;
    }

    function pickFirstLeafFromTree(tree) {
      for (const unit of tree) {
        const res = pickFirstLeafInNodes(unit.children, null);
        if (res) return { node: res.node, unitTitle: unit.title, unitId: unit.id, parentGroup: res.parentGroup };
      }
      return { node: null, unitTitle: '', unitId: '', parentGroup: null };
    }

    // ─── UTILITY COMPONENTS ──────────────────────────────────────────────────
    function SkeletonLine({ width = "100%", height = "16px", className = "" }) {
      return <div className={`shimmer rounded ${className}`} style={{ width, height }} />;
    }

    function LoadingSpinner({ size = 24, color = "border-blue-500" }) {
      return (
        <div className={`w-${size/4} h-${size/4} border-2 border-gray-200 border-t-${color.replace('border-','')} rounded-full spin-dot`} 
             style={{ width: size, height: size, borderTopColor: '#3B82F6', borderColor: '#E5E7EB' }} />
      );
    }

    function catalogKindPrefix(kind) {
      if (kind === 'oral' || kind === 'writing') return '◎ ';
      if (kind === 'reading') return '📚 ';
      if (kind === 'garden') return '🌿 ';
      if (kind === 'project') return '◇ ';
      if (kind === 'sample' || kind === 'sampleGroup') return '◇ ';
      if (kind === 'poem') return '◆ ';
      return '';
    }

    function CatalogTreeRows({ units, unit, depth, expandedIds, onToggle, selectedId, onSelectLeaf, parentGroupNode = null }) {
      return units.map((node) => {
        const hasChildren = node.children && node.children.length;
        const isOpen = !hasChildren || expandedIds.has(node.id);
        const prefix = catalogKindPrefix(node.kind);
        const star = node.star ? <span className="text-amber-500"> *</span> : null;
        return (
          <React.Fragment key={node.id}>
            <button
              type="button"
              className={`w-full flex items-start gap-1 py-1.5 pr-1 rounded-lg text-left transition ${
                selectedId === node.id
                  ? 'bg-blue-50 text-blue-900'
                  : 'text-gray-600 hover:bg-gray-50'
              }`}
              style={{ paddingLeft: 6 + depth * 12 }}
              onClick={() => {
                if (hasChildren) onToggle(node.id);
                else onSelectLeaf(node, unit, parentGroupNode);
              }}
            >
              <span
                className="text-gray-400 flex-shrink-0 w-4 h-4 flex items-center justify-center mt-0.5"
                onClick={(e) => {
                  if (!hasChildren) return;
                  e.stopPropagation();
                  onToggle(node.id);
                }}
              >
                {hasChildren ? (isOpen ? <Icons.CHEVRON_DOWN /> : <Icons.CHEVRON_RIGHT />) : <span className="w-1 h-1 rounded-full bg-gray-300 inline-block" />}
              </span>
              <span className="text-xs leading-snug flex-1 min-w-0">
                <span className="text-amber-600">{prefix}</span>
                {node.title}
                {star}
                {node.page ? <span className="text-gray-400 ml-1">{node.page}</span> : null}
              </span>
            </button>
            {hasChildren && isOpen ? (
              <CatalogTreeRows
                units={node.children}
                unit={unit}
                depth={depth + 1}
                expandedIds={expandedIds}
                onToggle={onToggle}
                selectedId={selectedId}
                onSelectLeaf={onSelectLeaf}
                parentGroupNode={node}
              />
            ) : null}
          </React.Fragment>
        );
      });
    }

    function CourseCatalogSidebar({
      versionId,
      gradeVolumeId,
      onVersionChange,
      onGradeVolumeChange,
      expandedIds,
      onToggleExpand,
      selectedLeafId,
      onSelectLeaf,
      collapsed,
      onToggleCollapse,
    }) {
      const tree = getCatalogTree(versionId, gradeVolumeId);
      const vName = TEXTBOOK_VERSIONS.find((v) => v.id === versionId)?.name || '';
      const gv = GRADE_VOLUMES.find((g) => g.id === gradeVolumeId)?.label || '';

      return (
        <aside className={`relative flex-shrink-0 self-start transition-all duration-300 ${collapsed ? 'w-[44px]' : 'w-[220px]'}`}>
          {/* 悬浮主体 */}
          <div className={`bg-white border border-gray-200 rounded-xl shadow-sm flex flex-col overflow-hidden transition-all duration-300 ${collapsed ? 'h-[44px]' : 'max-h-[calc(100vh-6rem)]'}`}>
            {/* 标题栏 — 始终可见 */}
            <div className={`flex items-center gap-2 h-11 px-3 border-b border-gray-100 flex-shrink-0 ${collapsed ? 'justify-center' : ''}`}>
              {!collapsed && <Icons.BOOK />}
              <span className={`text-xs font-medium text-gray-700 ${collapsed ? 'hidden' : ''}`}>课程目录</span>
              <button
                type="button"
                onClick={onToggleCollapse}
                className={`ml-auto p-1 rounded-md text-gray-400 hover:text-gray-600 hover:bg-gray-50 transition flex-shrink-0`}
                title={collapsed ? '展开目录' : '收起目录'}
              >
                {collapsed ? <Icons.CHEVRON_RIGHT /> : <Icons.CHEVRON_DOWN />}
              </button>
            </div>

            {/* 折叠时仅显示小图标 */}
            {collapsed ? (
              <div className="flex flex-col items-center py-2 gap-2">
                <div className="w-5 h-5 rounded bg-gray-100" />
                <div className="w-5 h-5 rounded bg-gray-100" />
                <div className="w-5 h-5 rounded bg-gray-100" />
              </div>
            ) : (
              <>
                {/* 版本 + 年级选择 */}
                <div className="px-3 pt-2.5 pb-2 space-y-2 border-b border-gray-100 flex-shrink-0">
                  <div className="space-y-1">
                    <label className="text-xs text-gray-500">教材版本</label>
                    <select
                      value={versionId}
                      onChange={(e) => onVersionChange(e.target.value)}
                      className="w-full text-xs px-3 py-2 rounded-lg bg-gray-100 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer"
                    >
                      {TEXTBOOK_VERSIONS.map((v) => (
                        <option key={v.id} value={v.id}>{v.name}</option>
                      ))}
                    </select>
                  </div>
                  <div className="space-y-1">
                    <label className="text-xs text-gray-500">年级 / 册别</label>
                    <select
                      value={gradeVolumeId}
                      onChange={(e) => onGradeVolumeChange(e.target.value)}
                      className="w-full text-xs px-3 py-2 rounded-lg bg-gray-100 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer"
                    >
                      {GRADE_VOLUMES.map((g) => (
                        <option key={g.id} value={g.id}>{g.label}</option>
                      ))}
                    </select>
                  </div>
                  <p className="text-xs text-gray-400">{vName} · {gv}</p>
                </div>

                {/* 目录树 — 可滚动 */}
                <div className="flex-1 overflow-y-auto py-2 px-2">
                  {tree.map((unit) => (
                    <div key={unit.id} className="mb-1.5">
                      <button
                        type="button"
                        className="w-full flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-left text-xs font-medium text-gray-700 hover:bg-gray-100 transition"
                        onClick={() => onToggleExpand(unit.id)}
                      >
                        <span className="text-blue-500 flex-shrink-0">
                          {expandedIds.has(unit.id) ? <Icons.CHEVRON_DOWN /> : <Icons.CHEVRON_RIGHT />}
                        </span>
                        <Icons.FOLDER />
                        <span className="truncate">{unit.title}</span>
                      </button>
                      {expandedIds.has(unit.id) && unit.children ? (
                        <div className="mt-0.5 ml-2">
                          <CatalogTreeRows
                            units={unit.children}
                            unit={unit}
                            depth={0}
                            expandedIds={expandedIds}
                            onToggle={onToggleExpand}
                            selectedId={selectedLeafId}
                            onSelectLeaf={onSelectLeaf}
                            parentGroupNode={null}
                          />
                        </div>
                      ) : null}
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        </aside>
      );
    }

    /** 目录标题 → 与 book/ 下映射的课文名对齐 */
    function normalizeCatalogTitleForBook(raw) {
      if (!raw) return '';
      let t = raw.replace(/^\d+\s+/, '').trim();
      t = t.replace(/（[^）]*）/g, '').trim();
      return t;
    }

    /** 当前选中目录节点对应哪条课文（子课文用父篇名，如「寒食」→「古诗三首」） */
    function getLessonKeyForImages(node, parentGroupNode) {
      if (!node) return '';
      if ((node.kind === 'sub' || node.kind === 'sample') && parentGroupNode) {
        return normalizeCatalogTitleForBook(parentGroupNode.title);
      }
      if (node.kind === 'oral' || node.kind === 'writing' || node.kind === 'reading') {
        const p = node.title.split('：')[0];
        return (p || node.title).trim();

## 四、重点句段赏析（核心考点）
### 1. 中心句/写景句/写人句赏析
- **句段1**：“这不是粥，而是小型的农业产品展览会。”（第①段）
  - **修辞**：比喻（把腊八粥比作农业产品展览会）
  - **表达效果**：生动形象地写出了腊八粥中米、豆、干果的种类繁多，体现了农业社会的丰收成果，突出了人们的自傲心理。
  - **作用说明**：表现了腊八节的独特习俗，为下文描写春节的热闹场景做铺垫。

- **句段2**：“除夕真热闹。家家赶做年菜，到处是酒肉的香味。老少男女都穿起新衣，门外贴好红红的对联，屋里贴好各色的年画，哪一家都灯火通宵，不许间断，鞭炮声日夜不绝。”（第⑤段）
  - **描写手法**：环境描写、场面描写
  - **表达效果**：从嗅觉（酒肉的香味）、视觉（新衣、对联、年画、灯火）、听觉（鞭炮声）三个方面描绘了除夕的热闹场景，展现了家庭团圆的温馨与节日的喜庆。
  - **作用说明**：点明“除夕真热闹”的中心，使读者有身临其境的感觉。

- **句段3**：“有名的老铺都要挂出几百盏灯来：有的一律是玻璃的，有的清一色是牛角的，有的都是纱灯；有的通通彩绘《红楼梦》或《水浒传》故事，有的图案各式各样。”（第⑧段）
  - **修辞**：排比（“有的……有的……有的……”）
  - **表达效果**：通过排比句式，详细列举了老铺挂出的各种灯的类型，突出了元宵节灯的数量多、种类丰富，展现了节日的繁华与美丽。
  - **作用说明**：体现了元宵节作为春节又一个高潮的特点，吸引读者的阅读兴趣。

### 2. 特殊句式解析
- **句段**：“孩子们喜欢吃这些零七八碎儿，即使没有饺子吃，也必须买杂拌儿。”（第②段）
  - **句式**：假设复句（“即使……也……”）
  - **表达效果**：突出了孩子们对杂拌儿的喜爱程度，哪怕没有饺子吃，也要买杂拌儿，体现了春节期间孩子们的快乐与满足。

## 五、写作手法总结
### 1. 时间顺序
- **举例**：按照“腊八→小年→除夕→初一→初六→元宵→正月十九”的时间顺序描写春节的习俗。
- **迁移价值**：在写作中，采用时间顺序可以使文章结构清晰，条理分明，便于读者理解事件的发展过程。

### 2. 详略得当
- **举例**：详细描写了腊八、小年、除夕、初一、元宵的习俗，简略描写了初六、正月十九的场景。
- **迁移价值**：在写作中，根据主题的需要，对重要内容进行详细描写，对次要内容进行简略处理，可以突出重点，增强文章的感染力。

### 3. 修辞手法的运用
- **举例**：比喻（腊八粥比作农业产品展览会）、排比（元宵节灯的描写）、拟人（“除夕噼里啪啦大笑着走来，又噼里啪啦大笑着离去”）。
- **迁移价值**：在写作中，合理运用修辞手法可以使文章更加生动形象，增强语言的表现力。

### 4. 对比手法
- **举例**：除夕的热闹与初一的安静形成对比，突出了春节期间不同时间的光景特点。
- **迁移价值**：在写作中，运用对比手法可以突出事物的特点，增强文章的说服力。

### 5. 细节描写
- **举例**：描写腊八蒜“色如翡翠，醋也有了些辣味，色味双美”，展现了腊八蒜的特点。
- **迁移价值**：在写作中，通过细节描写可以使文章更加具体生动，让读者有身临其境的感觉。

                <button
                  onClick={() => setShowModal(true)}
                  className="w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold text-base rounded-2xl shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-3"
                >
                  <span className="text-white"><Icons.ROCKET /></span>
                  一键发布教学流程
                  <span className="text-blue-200 text-sm font-normal ml-1">开启全链路数据闭环</span>
                </button>
                <p className="text-xs text-gray-400">发布后，系统将自动推送课前学案至学生端，并开启课中数据采集</p>
              </div>
            </div>
          )}

          {/* 成功弹窗 */}
          {showModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/40 overlay-in" onClick={() => setShowModal(false)} />
              <div className="relative bg-white rounded-3xl p-8 max-w-sm w-full text-center success-pop shadow-2xl">
                <div className="w-20 h-20 rounded-full bg-emerald-100 flex items-center justify-center mx-auto mb-4">
                  <span className="text-emerald-500"><Icons.CHECK_CIRCLE /></span>
                </div>
                <h3 className="text-xl font-bold text-gray-800 mb-2">发布成功！</h3>
                <p className="text-gray-500 text-sm mb-1">全链路数据闭环已开启</p>
                <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-xl p-3 mb-5 text-left text-xs text-emerald-700 space-y-1.5">
                  <p>✓ 课前学案已推送至全班 32 名学生</p>
                  <p>✓ 课中教学工具已同步至教师端</p>
                  <p>✓ 课后分层作业已配置完毕</p>
                  <p>✓ 个性化辅导策略已激活</p>
                </div>
                <div className="flex gap-3">
                  <button
                    onClick={() => setShowModal(false)}
                    className="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-50 transition"
                  >
                    查看详情
                  </button>
                  <button
                    onClick={handlePublish}
                    className="flex-1 px-4 py-2.5 rounded-xl bg-emerald-500 text-white text-sm font-medium hover:bg-emerald-600 transition"
                  >
                    完成
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────────────
    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [contentKey, setContentKey] = useState(0);
      const [catalogVersion, setCatalogVersion] = useState('bb');
      const [catalogGrade, setCatalogGrade] = useState('g6x');
      const [expandedIds, setExpandedIds] = useState(() => buildExpandedDefaults('bb', 'g6x'));
      const initialCatalogPick = (() => {
        const t = getCatalogTree('bb', 'g6x');
        return pickFirstLeafFromTree(t);
      })();
      const [selectedLeafId, setSelectedLeafId] = useState(initialCatalogPick.node?.id || 'u1-1');
      const [catalogUnitId, setCatalogUnitId] = useState(initialCatalogPick.unitId || 'u1');
      const [catalogLeafNode, setCatalogLeafNode] = useState(initialCatalogPick.node);
      const [catalogParentGroupNode, setCatalogParentGroupNode] = useState(initialCatalogPick.parentGroup);
      const [selectedLessonLine, setSelectedLessonLine] = useState(() =>
        initialCatalogPick.node
          ? formatCatalogLessonLine('g6x', initialCatalogPick.unitTitle, initialCatalogPick.node)
          : ''
      );
      const [catalogCollapsed, setCatalogCollapsed] = useState(false);
      const [stepBarCollapsed, setStepBarCollapsed] = useState(false);

      useEffect(() => {
        const t = getCatalogTree(catalogVersion, catalogGrade);
        setExpandedIds(buildExpandedDefaults(catalogVersion, catalogGrade));
        const first = pickFirstLeafFromTree(t);
        if (first.node) {
          setSelectedLeafId(first.node.id);
          setCatalogUnitId(first.unitId || 'u1');
          setCatalogLeafNode(first.node);
          setCatalogParentGroupNode(first.parentGroup);
          setSelectedLessonLine(formatCatalogLessonLine(catalogGrade, first.unitTitle, first.node));
        }
      }, [catalogVersion, catalogGrade]);

      const toggleCatalogExpand = (id) => {
        setExpandedIds((prev) => {
          const n = new Set(prev);
          if (n.has(id)) n.delete(id);
          else n.add(id);
          return n;
        });
      };

      const handleSelectCatalogLeaf = (node, unit, parentGroupNode) => {
        setSelectedLeafId(node.id);
        setCatalogUnitId(unit.id);
        setCatalogLeafNode(node);
        setCatalogParentGroupNode(parentGroupNode || null);
        setSelectedLessonLine(formatCatalogLessonLine(catalogGrade, unit.title, node));
      };

      const steps = [
        { label: '课程初始化', sub: 'Step 1' },
        { label: '教案学案', sub: 'Step 2' },
        { label: '课中工具', sub: 'Step 3' },
        { label: '分层作业', sub: 'Step 4' },
        { label: '个性化辅导', sub: 'Step 5' },
      ];

      const goNext = () => {
        if (currentStep < steps.length - 1) {
          setCurrentStep(s => s + 1);
          setContentKey(k => k + 1);
        }
      };

      const goPrev = () => {
        if (currentStep > 0) {
          setCurrentStep(s => s - 1);
          setContentKey(k => k + 1);
        }
      };

      const handleReset = () => {
        setCurrentStep(0);
        setContentKey(k => k + 1);
      };

      const stepComponents = [
        <StepCourseInit
          key={contentKey}
          catalogLeafNode={catalogLeafNode}
          catalogParentGroupNode={catalogParentGroupNode}
          catalogUnitId={catalogUnitId}
          selectedLessonLine={selectedLessonLine}
        />,
        <StepLessonPlan key={contentKey} />,
        <StepInClassTools key={contentKey} />,
        <StepPostClassHomework key={contentKey} />,
        <StepTutoring key={contentKey} onPublish={handleReset} />,
      ];

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 flex flex-col">
          {/* ── 全局顶部导航栏 ── */}
          <header className="bg-white/80 backdrop-blur-md border-b border-gray-200/80 sticky top-0 z-40 shadow-sm">
            <div className="max-w-6xl mx-auto px-5 h-14 flex items-center">
              {/* Logo */}
              <div className="flex items-center gap-2.5 flex-shrink-0" style={{ marginLeft: '-370px' }}>
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-sm">
                  <span className="text-white"><Icons.AI /></span>
                </div>
                <span className="font-bold text-gray-800 tracking-tight text-[15px]">未来课堂</span>
              </div>

              {/* 导航项 — 不换行，中间居中 */}
              <nav className="flex items-center gap-1 flex-1 justify-center flex-nowrap overflow-x-auto">
                {[
                  { icon: <Icons.HOME />, label: '教师工作台', active: false },
                  { icon: <Icons.DOCS />, label: '班级管理', active: false },
                  { icon: <Icons.AI />, label: '创建教学流程', active: true },
                  { icon: <Icons.LAYERS />, label: '资源库', active: false },
                  { icon: <Icons.EDIT />, label: '作业管理', active: false },
                  { icon: <Icons.GAME />, label: '课堂互动', active: false },
                  { icon: <Icons.SETTINGS />, label: '管理后台', active: false },
                ].map((item, i) => (
                  <button key={i} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-150 flex-shrink-0 whitespace-nowrap ${
                    item.active
                      ? 'bg-blue-50 text-blue-600'
                      : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'
                  }`}>
                    <span className={item.active ? 'text-blue-500' : 'text-gray-400'}>{item.icon}</span>
                    {item.label}
                  </button>
                ))}
              </nav>

              {/* 右侧操作区 */}
              <div className="flex items-center gap-2 flex-shrink-0" style={{ marginRight: '-370px' }}>
                {/* 通知 */}
                <button className="relative w-9 h-9 rounded-xl bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-500 transition-all duration-150 flex-shrink-0">
                  <Icons.BELL />
                  <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border border-white" />
                </button>
                {/* 用户头像 */}
                <button className="flex items-center gap-2 group flex-shrink-0">
                  <div className="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white text-sm font-semibold shadow-sm">
                    刘
                  </div>
                  <span className="text-xs text-gray-500 group-hover:text-gray-700 transition hidden md:inline">刘老师</span>
                </button>
              </div>
            </div>
          </header>

          {/* ── 主体：目录 | 流程 | 主内容，三列顶对齐 + 左右留白（与线框一致） ── */}
          <main className="flex-1 w-full min-h-0">
            <div className="mx-auto w-full max-w-[min(100%,1680px)] px-5 sm:px-6 md:px-8 lg:px-10 py-4 pb-8 flex flex-col lg:flex-row lg:items-start gap-4 md:gap-5 lg:gap-6">
              {/* 列1：课程目录 */}
              <div className="flex justify-center lg:justify-start lg:flex-shrink-0 lg:self-start">
                <CourseCatalogSidebar
                  versionId={catalogVersion}
                  gradeVolumeId={catalogGrade}
                  onVersionChange={setCatalogVersion}
                  onGradeVolumeChange={setCatalogGrade}
                  expandedIds={expandedIds}
                  onToggleExpand={toggleCatalogExpand}
                  selectedLeafId={selectedLeafId}
                  onSelectLeaf={handleSelectCatalogLeaf}
                  collapsed={catalogCollapsed}
                  onToggleCollapse={() => setCatalogCollapsed((v) => !v)}
                />
              </div>

              {/* 列2：教学流程（高度随内容，与目录顶对齐） */}
              <div className={`hidden lg:flex flex-shrink-0 self-start transition-all duration-300 ${stepBarCollapsed ? 'w-[44px]' : 'w-[150px]'}`}>
                <div className={`bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden w-full transition-all duration-300 ${stepBarCollapsed ? 'h-[44px]' : ''}`}>
                  <div className={`flex items-center h-11 px-3 border-b border-gray-100 flex-shrink-0 ${stepBarCollapsed ? 'justify-center' : ''}`}>
                    {!stepBarCollapsed && <span className="text-xs font-medium text-gray-700">教学流程</span>}
                    <button
                      type="button"
                      onClick={() => setStepBarCollapsed((v) => !v)}
                      className="ml-auto p-1 rounded-md text-gray-400 hover:text-gray-600 hover:bg-gray-50 transition flex-shrink-0"
                      title={stepBarCollapsed ? '展开' : '收起'}
                    >
                      {stepBarCollapsed ? <Icons.CHEVRON_RIGHT /> : <Icons.CHEVRON_DOWN />}
                    </button>
                  </div>
                  {stepBarCollapsed ? (
                    <div className="flex flex-col items-center py-2 gap-1.5">
                      {[0, 1, 2].map((i) => (
                        <div key={i} className={`w-7 h-7 rounded-lg ${i === currentStep ? 'bg-blue-500' : 'bg-gray-100'} ${i < currentStep ? 'opacity-50' : ''}`} />
                      ))}
                    </div>
                  ) : (
                    <div className="overflow-y-auto py-3 px-2.5 max-h-[calc(100vh-7rem)]">
                      <div className="relative">
                        <div
                          className="absolute left-[22px] top-1 bottom-1 w-px bg-gray-200 rounded-full overflow-hidden pointer-events-none"
                          aria-hidden
                        />
                        <div
                          className="absolute left-[22px] top-1 w-px bg-blue-500 rounded-full transition-all duration-500 ease-out pointer-events-none"
                          aria-hidden
                          style={{ height: `${(currentStep / (steps.length - 1)) * 100}%` }}
                        />
                        <ol className="relative z-[1] space-y-0 list-none m-0 p-0">
                          {steps.map((step, i) => {
                            const done = i < currentStep;
                            const active = i === currentStep;
                            return (
                              <li key={i} className="relative pb-6 last:pb-0">
                                <button
                                  type="button"
                                  onClick={() => { setCurrentStep(i); setContentKey((k) => k + 1); }}
                                  className={`w-full flex items-center gap-2.5 text-left rounded-lg px-1.5 py-1 transition ${active ? 'bg-blue-50' : 'hover:bg-gray-50'}`}
                                >
                                  <span className={`relative z-10 flex-shrink-0 w-8 h-8 rounded-xl flex items-center justify-center text-xs font-bold transition-all ${done ? 'bg-blue-500 text-white' : active ? 'bg-blue-600 text-white ring-2 ring-blue-200 ring-offset-1' : 'bg-gray-100 text-gray-400'}`}>
                                    {done ? <span className="text-white"><Icons.CHECK_CIRCLE /></span> : i + 1}
                                  </span>
                                  <span className="min-w-0">
                                    <span className={`block text-xs font-medium ${active ? 'text-blue-600' : done ? 'text-gray-400' : 'text-gray-400'}`}>{step.sub}</span>
                                    <span className={`block text-xs font-medium ${active ? 'text-gray-800' : done ? 'text-gray-500' : 'text-gray-400'}`}>{step.label}</span>
                                  </span>
                                </button>
                              </li>
                            );
                          })}
                        </ol>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* 列3：主内容（占满剩余宽度） */}
              <div className="flex-1 min-w-0 flex flex-col gap-4">
                <div className="lg:hidden bg-white rounded-xl shadow-sm border border-gray-100 p-3 flex justify-between gap-1 overflow-x-auto">
                  {steps.map((step, i) => (
                    <button
                      key={i}
                      type="button"
                      onClick={() => { setCurrentStep(i); setContentKey((k) => k + 1); }}
                      className={`flex-shrink-0 px-2 py-1 rounded-lg text-center min-w-[4.5rem] ${
                        i === currentStep ? 'bg-blue-50 text-blue-700' : 'text-slate-400'
                      }`}
                    >
                      <span className="block text-[10px]">{step.sub}</span>
                      <span className="block text-[10px] font-medium truncate max-w-[5rem]">{step.label}</span>
                    </button>
                  ))}
                </div>

                <div className="bg-white rounded-2xl shadow-card border border-gray-100/80 p-4 md:p-6 min-h-[360px]">
                  <div key={contentKey} className="animate-in">
                    {stepComponents[currentStep]}
                  </div>
                </div>

                <div className="flex items-center justify-between gap-3">
                  <button
                    onClick={goPrev}
                    disabled={currentStep === 0}
                    className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-medium text-sm transition-all duration-200 ${
                      currentStep === 0
                        ? 'text-gray-300 cursor-not-allowed'
                        : 'text-gray-600 hover:bg-white hover:shadow-sm hover:text-gray-800'
                    }`}
                  >
                    <Icons.ARROW_LEFT />
                    上一步
                  </button>

                  <span className="text-[10px] sm:text-xs text-slate-400 tabular-nums shrink-0 px-1">
                    第 {currentStep + 1} / {steps.length} 步
                  </span>

                  {currentStep < steps.length - 1 ? (
                    <button
                      onClick={goNext}
                      className="flex items-center gap-2 px-4 sm:px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium text-sm transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] shadow-md shadow-blue-200"
                    >
                      <span className="hidden sm:inline">下一步：{steps[currentStep + 1].label}</span>
                      <span className="sm:hidden">下一步</span>
                      <Icons.ARROW_RIGHT />
                    </button>
                  ) : (
                    <div className="w-[108px]" />
                  )}
                </div>

                <p className="text-center text-xs text-gray-300 pt-2">
                  未来课堂 · 智能教学流程演示 · All data is mock for demonstration only
                </p>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
